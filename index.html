<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Vizualizacija Nobelovih nagrada</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://d3js.org/d3.v3.min.js"></script>
</head>

<body>

    <header>
        <h1>Više od stoljeća Nobelovih nagrada</h1>
        <h2>Interaktivna vizualizacija Nobelovih nagrada od 1901 do 2025</h2>

        <button id="themeToggle">Light Mode</button>
    </header>

    <main>
        <section id="stats-container">
            <div class="card stat-card">
                <div class="stat-title">Ukupan broj dobitnika</div>
                <div class="stat-value">-</div>
            </div>

            <div class="card stat-card">
                <div class="stat-title">Ukupan broj država</div>
                <div class="stat-value">-</div>
            </div>

            <div class="card stat-card">
                <div class="stat-title">Država s najviše dobitnika</div>
                <div class="stat-value">-</div>
            </div>

            <div class="card stat-card">
                <div class="stat-title">Kategorija s najviše dobitnika</div>
                <div class="stat-value">-</div>
            </div>
        </section>

        <section id="timeline-wrapper">
            <aside id="filterSidebar">
                <h2 style="text-align: center;">FILTERI</h2>
                <button id="resetFiltersBtn">Resetiraj filtere</button>
                <div class="filter-group">
                    <div class="filter-group-title">Spol</div>
                    <button class="filter-btn active" data-gender="all">Svi</button>
                    <button class="filter-btn" data-gender="male">Muški</button>
                    <button class="filter-btn" data-gender="female">Ženski</button>
                </div>
                <div class="filter-group">
                    <div class="filter-group-title">Regija</div>
                    <button class="filter-btn active" data-region="all">Sve</button>
                    <button class="filter-btn" data-region="Europe">Europa</button>
                    <button class="filter-btn" data-region="Americas">Amerike</button>
                    <button class="filter-btn" data-region="Asia">Azija</button>
                    <button class="filter-btn" data-region="Africa">Afrika</button>
                    <button class="filter-btn" data-region="Oceania">Oceanija</button>
                </div>
                <div class="filter-group">
                    <div class="filter-group-title">Kategorija</div>
                    <button class="filter-btn active" data-category="all">Sve</button>
                    <button class="filter-btn" data-category="Medicine">Medicina</button>
                    <button class="filter-btn" data-category="Physics">Fizika</button>
                    <button class="filter-btn" data-category="Chemistry">Kemija</button>
                    <button class="filter-btn" data-category="Peace">Mir</button>
                    <button class="filter-btn" data-category="Literature">Književnost</button>
                    <button class="filter-btn" data-category="Economy">Ekonomija</button>
                </div>
            </aside>

            <section class="chart-container" id="timelineBox">
                <h2 id="timelineTitle">BROJ DOBITNIKA PO GODINAMA</h2>
                <div id="timelineChart"></div>
            </section>

            <section id="detailView" class="chart-container">
                <h2 id="detailTitle"></h2>
                <div id="detailList"></div>
            </section>
</section>

        <section id="charts-wrapper">
            <section class="chart-container">
                <div id="countryChart"></div>
            </section>

            <section class="chart-container">
                <div id="categoryChart"></div>
            </section>
        </section>
    </main>

    <div id="tooltip"></div>
   
    <script src="script.js"></script>

</body>
</html>
